name: Apply category expansion

on:
  push:
    branches:
      - feature/category-expansion

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/category-expansion
          fetch-depth: 0

      - name: Apply generated source updates
        run: |
          python scripts/apply_a_core.py
          python scripts/apply_b_generator.py
          python scripts/apply_c_app.py
          python scripts/apply_d_styles_docs.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Commit expanded category campaign
        run: |
          rm -f scripts/apply_a_core.py scripts/apply_b_generator.py scripts/apply_c_app.py scripts/apply_d_styles_docs.py
          rm -f .github/workflows/apply-category-expansion.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: expand campaign into progressive categories"
          git push origin HEAD:feature/category-expansion
